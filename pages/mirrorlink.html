<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>direct link</title>

    <link rel="stylesheet" href="../resources/fonts/bootstrap-font/bootstrap-icons.css"/>
    <link rel="stylesheet" href="../libs/bootstrap-4.5.0-dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="../libs/styles/hamberger-button.css"/>
    <link rel="stylesheet" href="../libs/styles/mirrorlink.css"/>
    <link rel="stylesheet" href="../libs/styles/ring-loader.css"/>
    
    <script type="text/javascript" src="../libs/jquery/3.5.1/jquery-3.5.1.min.js"></script>
    <script type="text/javascript" src="../libs/bootstrap-4.5.0-dist/js/bootstrap.min.js"></script>
    <script type="text/javascript" src="../libs/scripts/hamberger-button.js"></script>
    <script type="text/javascript" src="../libs/scripts/mirrorlink.js"></script>

</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <a id="navbarNavBrand" class="navbar-brand" href="..">
            SMR (home)
        </a>
        <a id="toggle"  type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav"
        aria-expanded="false" aria-label="Toggle navigation"><span></span></a>
        
        <div id="navbarNav" class="collapse navbar-collapse">
            <ul class="navbar-nav text-right">
                <li class="nav-item">
                    <a class="nav-link" href="../#myRepositories">
                        My Repositories
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="../#contactMe">
                        Contact Me
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" onclick="$('#register-modal').modal('show');">
                        Register
                    </a>
                </li>
            </ul>
        </div>
    </nav>

    <div class="container w-75 pt-5 pb-5">
        <div class="form-group">
            <span  id="message" class="p-2 rounded" >message</span>            
        </div>
        <div class="form-group">
            <label for="urls" class="text-dark">URLs:</label>

            <textarea id="urls" rows="2" name="urls" class="form-control" aria-describedby="helpId" placeholder="URLs (e.g. https://example.com/file)." required></textarea>                

            <div class="row">
                <small id="helpId" class="form-text text-muted col-6">
                    Enter URLs one per line.
                </small>
                <small id="charCount" class="form-text text-muted text-right col-6">
                    0 ch<br> 0 ln
                </small>
            </div>
        </div>

        <div class="form-group text-right mt-3">
            <input class="btn btn-light" type="submit" value="Upload" id='submit' name='submit'>
        </div>
        
        <div class='container-fluid p-0 mt-3'>               
            <div class="row mb-2">
                <div class="col-6">
                    Used space:
                </div>
                <div id="remained-size" class="col-6 text-right">
                    0/0 MB
                </div>
                <div class="col-12">
                    <div id="progress-container" class="progress"></div>
                </div>
            </div>

            <div class="row">
                <div class="col-12">
                    Current links:
                </div>
            </div>
        </div>

        <div id="links-container" class='container-fluid'> 
            -
        </div>

        <div id="download-process" class='container mt-3'></div>
    </div>

    <div  id="register-modal" class="modal fade" tabindex="-1" role="dialog">
        <div class="modal-dialog" role="document">
            <div class="modal-content">
                <div id="modal-body" class="modal-body container">
                        <div class="row form-inline p-3">
                            <input id="regUsername" name="regUsername" type="text" class="form-control col-6" placeholder="username" required>
                            <div class="col-1"></div>
                            <input id="regPassword" name="regPassword" type="text" class="form-control col-5" placeholder="password" required>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-dismiss="modal">close</button>
                        <input id="register" name="register" type="submit"  class="btn btn-info" data-dismiss="modal" value="apply">
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
